<!DOCTYPE html>
<html>
<head><title>L O O O O K</title><style>body{margin:0;font-family:Arial;background:#fff}.site-header{padding:30px}.grid{padding:140px 30px 0;columns:3;gap:60px}.grid-item{break-inside:avoid;margin-bottom:80px;cursor:pointer}.grid-item img{width:100%;opacity:0;transition:opacity 0.8s}.grid-item img.loaded{opacity:1}.overlay{position:fixed;inset:0;background:#fff;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}.overlay.active{opacity:1;pointer-events:all}.overlay img{max-width:90vw;max-height:88vh;object-fit:contain}</style></head>
<body>
<header class="site-header"><h1>L O O O O K</h1></header>
<main class="grid" id="grid"></main>
<div class="overlay" id="overlay" onclick="closeOverlay()"><img id="overlay-img"></div>
<script>
const POOL = [

];
const today = new Date();
const daySeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
function shuffle(arr, seed) {
  const shuffled = arr.slice();
  let s = seed;
  for (let i = shuffled.length - 1; i > 0; i--) {
    s = (s * 16807) % 2147483647;
    const j = Math.floor((s / 2147483647) * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}
const shuffled = shuffle(POOL, daySeed);
const grid = document.getElementById('grid');
shuffled.forEach(item => {
  const div = document.createElement('div');
  div.className = 'grid-item size-' + item.size;
  div.innerHTML = '<img src="' + item.src + '" onload="this.classList.add(\'loaded\')" onclick="openOverlay(\'' + item.src + '\')"><div>' + item.meta + '</div>';
  grid.appendChild(div);
});
function openOverlay(src) {
  document.getElementById('overlay-img').src = src;
  document.getElementById('overlay').classList.add('active');
}
function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}
</script>
</body>
</html>
