  .grid-item:nth-child(7n+3) { padding-top: 3vw; }
  .grid-item:nth-child(7n+4) { padding-top: 12vw; }

  /* ── FULLSCREEN OVERLAY ── */
  .overlay {
    position: fixed; inset: 0;
    background: #fff;
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
    cursor: pointer;

  .overlay img { max-width: 90vw; max-height: 88vh; object-fit: contain; }
  .overlay .overlay-meta {
    position: fixed; bottom: 24px; left: 32px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 9px; letter-spacing: 0.08em;
    color: #bbb; text-transform: uppercase;
  }

  /* ── LOADING SPINNER (endless scroll) ── */
  .loader {
    text-align: center;
    padding: 6vw 0 10vw;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .loader.visible { opacity: 1; }
  .loader-dot {
    display: inline-block;
    width: 4px; height: 4px;
    background: #ccc;
    border-radius: 50%;
    margin: 0 3px;
    animation: pulse 1.2s infinite ease-in-out;
  }
  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── SCROLL REVEAL ── */
  .grid-item {
    transform: translateY(30px);
    opacity: 0;
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .grid-item.in-view {
    transform: translateY(0);
    opacity: 1;
  }

  @media (max-width: 768px) {

    .grid-item img { max-width: 100% !important; }
    .grid-item .meta { font-size: 8px; margin-top: 8px; }
  }

  /* ── TABLET ── */
  @media (min-width: 769px) and (max-width: 1100px) {
    .grid { columns: 2; column-gap: 6vw; }
    .grid-item { margin-bottom: 12vw; }
  }

  { src: "https://i.pinimg.com/736x/f2/7a/44/f27a445a76040ad426624b3ef9419602.jpg", meta: "REF_CREATIVE_070", size: "l" },
  { src: "https://i.pinimg.com/736x/15/df/60/15df608e9f0938e1413eb11ddf764143.jpg", meta: "REF_STREET_VINTAGE_CAR_BW_022", size: "l" },
];

// URL sanitizer — auto-fix entries missing https:// prefix
POOL.forEach(function(item) { if (item.src && !item.src.startsWith('http')) { item.src = 'https://' + item.src; } });

// ── DAILY SHUFFLE ─ new order every day, no adjacent duplicates ──
function seededShuffle(arr, seed) {
  const shuffled = arr.slice();
  let s = seed;
  function rand() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; }
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

// Deduplicate pool by image src so copies never appear near each other
const uniquePool = [];
const seenSrc = new Set();
POOL.forEach(function(item) {
  if (!seenSrc.has(item.src)) {
    seenSrc.add(item.src);
    uniquePool.push(item);
  }
});

const today = new Date();
const daySeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
const shuffledUnique = seededShuffle(uniquePool, daySeed);

// Build variant map so meta labels still rotate
const metaMap = {};
POOL.forEach(function(item) {
  if (!metaMap[item.src]) metaMap[item.src] = [];
  metaMap[item.src].push({ meta: item.meta, size: item.size });
});

// Rebuild SHUFFLED by cycling through unique images
// Minimum distance between same photo = uniquePool.length
const SHUFFLED = [];
const metaIdx = {};
for (let i = 0; i < POOL.length; i++) {
  const base = shuffledUnique[i % shuffledUnique.length];
  if (!metaIdx[base.src]) metaIdx[base.src] = 0;
  const variants = metaMap[base.src];
  const variant = variants[metaIdx[base.src] % variants.length];
  metaIdx[base.src]++;
  SHUFFLED.push({ src: base.src, meta: variant.meta, size: variant.size });
}

const grid = document.getElementById('grid');
const loader = document.getElementById('loader');
let poolIndex = 0;
let loading = false;
const BATCH = 9;

// ── RENDER A BATCH ──
function renderBatch() {
  const frag = document.createDocumentFragment();
  for (let i = 0; i < BATCH; i++) {
    const item = SHUFFLED[poolIndex % SHUFFLED.length];
    poolIndex++;

    const div = document.createElement('div');
    div.className = 'grid-item size-' + item.size;
    div.innerHTML =
      '<img src="' + item.src + '" alt="" loading="lazy" onload="this.classList.add(\'loaded\')">' +
      '<div class="meta">' + item.meta + '</div>';
    div.addEventListener('click', function() { openOverlay(item.src, item.meta); });
    frag.appendChild(div);
  }
  grid.appendChild(frag);

  // Observe new items
  document.querySelectorAll('.grid-item:not(.observed)').forEach(function(el) {
    el.classList.add('observed');
    revealObserver.observe(el);
  });
}

// ── SCROLL REVEAL ──
const revealObserver = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      entry.target.classList.add('in-view');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.06 });

// ── INFINITE SCROLL ──
const scrollObserver = new IntersectionObserver(function(entries) {
  if (entries[0].isIntersecting && !loading) {
    loading = true;
    loader.classList.add('visible');
    setTimeout(function() {
      renderBatch();
      loading = false;
      loader.classList.remove('visible');
    }, 600);
  }
}, { rootMargin: '600px' });

// ── FETCH FRESH PICKS FROM API ──
async function loadFreshPicks() {
  try {
    const resp = await fetch('/api/fresh-images');
    if (!resp.ok) return;
    const data = await resp.json();
    if (data.images && data.images.length > 0) {
      // Inject fresh picks at the front of the pool
      data.images.forEach(function(img) {
        if (img.src && !seenSrc.has(img.src)) {
          seenSrc.add(img.src);
          POOL.unshift({ src: img.src, meta: img.meta || 'FRESH_PICK', size: img.size || 'm' });
          uniquePool.unshift({ src: img.src, meta: img.meta || 'FRESH_PICK', size: img.size || 'm' });
        }
      });
      // Re-shuffle with fresh images included
      var newShuffled = seededShuffle(uniquePool, daySeed);
      SHUFFLED.length = 0;
      var newMetaIdx = {};
      for (var i = 0; i < Math.max(POOL.length, 90); i++) {
        var base = newShuffled[i % newShuffled.length];
        if (!newMetaIdx[base.src]) newMetaIdx[base.src] = 0;
        var variants = metaMap[base.src] || [{ meta: base.meta, size: base.size }];
        var variant = variants[newMetaIdx[base.src] % variants.length];
        newMetaIdx[base.src]++;
        SHUFFLED.push({ src: base.src, meta: variant.meta, size: variant.size });
      }
      console.log('Loaded ' + data.images.length + ' fresh picks');
      if (data.lastRefresh) {
        console.log('Last refresh: ' + data.lastRefresh);
      }
    }
  } catch (e) {
    console.log('Fresh picks not available yet');
  }
}

// ── INIT — load fresh picks then render ──
loadFreshPicks().then(function() {
  renderBatch();
  renderBatch();
  renderBatch();
  scrollObserver.observe(loader);
});

// ── FULLSCREEN ──
function openOverlay(src, meta) {
  document.getElementById('overlay-img').src = src.replace(/w=\d+/, 'w=1600');
  document.getElementById('overlay-meta').textContent = meta;
  document.getElementById('overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeOverlay(); });
</script>
