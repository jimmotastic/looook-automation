<!DOCTYPE html>
<html>
  <head><title>L O O O O K</title><style>body{margin:0;font-family:Arial;background:#fff}*{box-sizing:border-box}.site-header{padding:30px;position:fixed;top:0;left:0;right:0;background:#fff;z-index:100}.grid{padding:120px 30px 60px;columns:3;gap:50px}.grid-item{break-inside:avoid;margin-bottom:60px;cursor:pointer;opacity:0;transform:translateY(30px);transition:opacity 0.8s ease,transform 0.6s ease}.grid-item.visible{opacity:1;transform:translateY(0)}.grid-item img{width:100%;display:block;opacity:0;transition:opacity 0.8s}.grid-item img.loaded{opacity:1}.grid-item .label{font-size:11px;letter-spacing:2px;margin-top:12px;color:#999;font-family:monospace}.overlay{position:fixed;inset:0;background:#fff;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}.overlay.active{opacity:1;pointer-events:all}.overlay img{max-width:90vw;max-height:88vh;object-fit:contain}#sentinel{height:1px;width:100%}@media(max-width:800px){.grid{columns:2;gap:30px;padding:100px 16px 40px}.grid-item{margin-bottom:36px}}</style></head>
<body>
  <header class="site-header"><h1>L O O O O K</h1></header>header>
<main class="grid" id="grid"></main>main>
<div id="sentinel"></div>div>
<div class="overlay" id="overlay" onclick="closeOverlay()"><img id="overlay-img"></div>div>
<script>
                              const POOL = [
      { src: "https://i.pinimg.com/736x/30/9c/c2/309cc2c961372af5c2b3af634b447325.jpg", meta: "REF_DAILY_PULL_001", size: "s" },
      { src: "https://i.pinimg.com/736x/7c/a1/fd/7ca1fdf22a57970eb1f9dc9c9fddc98d.jpg", meta: "REF_DAILY_PULL_002", size: "l" },
      { src: "https://i.pinimg.com/736x/3d/fe/36/3dfe36771559c5fa5e1846fa040b2949.jpg", meta: "REF_DAILY_PULL_003", size: "m" },
      { src: "https://i.pinimg.com/736x/38/20/39/3820392915b1b99450443e3b8d60b129.jpg", meta: "REF_DAILY_PULL_004", size: "s" },
      { src: "https://i.pinimg.com/736x/a0/6e/48/a06e48b1a80c1a911674587f8c2da8ab.jpg", meta: "REF_DAILY_PULL_005", size: "l" },
      { src: "https://i.pinimg.com/736x/ac/20/8f/ac208f058baf5488e86e635702a40365.jpg", meta: "REF_DAILY_PULL_006", size: "m" }
    ];
  let batchIndex = 0;
  let loading = false;
  const grid = document.getElementById('grid');
  function shuffle(arr, seed) {
      const s = arr.slice();
      let r = seed;
      for (let i = s.length - 1; i > 0; i--) {
            r = (r * 16807) % 2147483647;
            const j = Math.floor((r / 2147483647) * (i + 1));
            [s[i], s[j]] = [s[j], s[i]];
      }
      return s;
  }
  function loadBatch() {
      if (loading || POOL.length === 0) return;
      loading = true;
      const today = new Date();
      const daySeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
      const seed = daySeed + batchIndex * 7919;
      const batch = shuffle(POOL, seed);
      batch.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'grid-item size-' + item.size;
            const img = document.createElement('img');
            img.src = item.src;
            img.alt = item.alt || 'LOOOOK';
            img.onload = function() { this.classList.add('loaded'); };
            img.onclick = function() { openOverlay(item.src); };
            div.appendChild(img);
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = item.meta;
            div.appendChild(label);
            grid.appendChild(div);
            setTimeout(() => {
                    const obs = new IntersectionObserver((entries) => {
                              entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
                    }, { threshold: 0.1 });
                    obs.observe(div);
            }, 50);
      });
      batchIndex++;
      loading = false;
  }
  loadBatch();
  loadBatch();
  const sentinel = document.getElementById('sentinel');
  const io = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) loadBatch();
  }, { rootMargin: '600px' });
  io.observe(sentinel);
  function openOverlay(src) {
      document.getElementById('overlay-img').src = src;
      document.getElementById('overlay').classList.add('active');
  }
  function closeOverlay() {
      document.getElementById('overlay').classList.remove('active');
  }
</script>
</body>
</html>
</script></h1>
</body></style></title></head>
</html>
