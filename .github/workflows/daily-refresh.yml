name: Pool Refresh (48h)

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  refresh-pool:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: Run pool refresh
        env:
          PINTEREST_BOARD_URL: ${{ secrets.PINTEREST_BOARD_URL }}
                    ARCHIVE_URL: https://jjjj-image-library.com/
        run: |
          python scripts/refresh_pool.py \
            --board-url "$PINTEREST_BOARD_URL" \
            --archive-url "$ARCHIVE_URL" \            
            --html-file "index.html"

      - name: Commit and push
        run: |
          if ! git diff --quiet index.html; then
            git config user.name "LOOOOK Bot"
            git config user.email "bot@looook.local"
            git add index.html
            git commit -m "refactor: refresh POOL - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
