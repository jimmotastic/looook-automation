name: Weekly Pinterest Scout

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: |
          python -m pip install --upgrade pip
          pip install playwright google-generativeai requests
          playwright install chromium

      - name: Run Pinterest Scout
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python scripts/pinterest_scout.py \
            --config scouts.config.json \
            --max-pins 50

      - name: Upload results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scout-batch
          path: scout-batch-*.json
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## 🔍 Scout Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
